<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add Event | 🌿 EcoClean Admin</title>
    <link rel="stylesheet" href="../styles/admin.css" />
    <link rel="stylesheet" href="../styles/event-form.css" />
    <link rel="icon" href="../assets/sustainability.png" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
</head>

<body>
    <header>
        <div class="container">
            <nav>
                <h2 id="nav-logo">🌿 EcoClean Admin</h2>
                <ul id="nav-menu">
                    <li><a href="#" onclick="logout(event)"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="admin-wrapper container">
        <aside class="sidebar">
            <ul class="sidebar-menu">
                <li><a href="admin.html"><i class="fas fa-arrow-left"></i> Back to Dashboard</a></li>
                <li><a href="add-event.html" class="active-page"><i class="fas fa-plus-circle"></i> Add Event</a></li>
            </ul>
        </aside>

        <main class="main-content">
            <div class="form-page-header">
                <div>
                    <h1 class="page-title"><i class="fas fa-calendar-plus"></i> Add New Event</h1>
                    <p class="welcome-message">Create a new EcoClean community event. Fill in all details accurately.
                    </p>
                </div>
            </div>

            <!-- Toast Notification -->
            <div class="toast" id="toast" role="alert" aria-live="polite"></div>

            <div class="form-card">
                <form id="addEventForm" onsubmit="handleAddEvent(event)">

                    <!-- Event Title -->
                    <div class="form-group">
                        <label for="title" class="form-label">
                            <i class="fas fa-heading"></i> Event Title <span class="required">*</span>
                        </label>
                        <input type="text" id="title" name="title" class="form-input" required minlength="5"
                            placeholder="e.g. Beach Cleanup Drive" maxlength="100" />
                        <span class="field-error" id="title-error"></span>
                    </div>

                    <!-- Description -->
                    <div class="form-group">
                        <label for="description" class="form-label">
                            <i class="fas fa-align-left"></i> Description <span class="required">*</span>
                        </label>
                        <textarea id="description" name="description" rows="4" class="form-input" required
                            placeholder="Describe the event activity, goals, and what volunteers should bring..."></textarea>
                        <span class="field-error" id="description-error"></span>
                    </div>

                    <!-- Location -->
                    <div class="form-group">
                        <label for="location" class="form-label">
                            <i class="fas fa-map-marker-alt"></i> Location <span class="required">*</span>
                        </label>
                        <input type="text" id="location" name="location" class="form-input" required
                            placeholder="e.g. Marina Beach, North End" />
                        <span class="field-error" id="location-error"></span>
                    </div>

                    <!-- Date + Time Row -->
                    <div class="form-row three-col">
                        <div class="form-group">
                            <label for="event_date" class="form-label">
                                <i class="fas fa-calendar"></i> Date <span class="required">*</span>
                            </label>
                            <input type="date" id="event_date" name="event_date" class="form-input" required />
                            <span class="field-error" id="date-error"></span>
                        </div>
                        <div class="form-group">
                            <label for="start_time" class="form-label">
                                <i class="fas fa-clock"></i> Start Time <span class="required">*</span>
                            </label>
                            <input type="time" id="start_time" name="start_time" class="form-input" required />
                            <span class="field-error" id="start-error"></span>
                        </div>
                        <div class="form-group">
                            <label for="end_time" class="form-label">
                                <i class="fas fa-clock"></i> End Time <span class="required">*</span>
                            </label>
                            <input type="time" id="end_time" name="end_time" class="form-input" required />
                            <span class="field-error" id="end-error"></span>
                        </div>
                    </div>

                    <!-- Image Upload -->
                    <div class="form-group">
                        <label class="form-label">
                            <i class="fas fa-image"></i> Event Image <span class="optional">(optional)</span>
                        </label>
                        <div class="image-upload-area" id="image-upload-area"
                            onclick="document.getElementById('image_file').click()">
                            <div class="upload-placeholder" id="upload-placeholder">
                                <i class="fas fa-cloud-upload-alt upload-icon"></i>
                                <p class="upload-text">Click to upload or drag &amp; drop</p>
                                <p class="upload-hint">JPG, PNG, WEBP up to 5 MB</p>
                            </div>
                            <img id="image-preview" class="image-preview" src="" alt="Preview" style="display:none;" />
                        </div>
                        <input type="file" id="image_file" name="image_file" accept="image/*" class="file-input-hidden"
                            onchange="handleImageUpload(this)" />
                        <div class="image-actions" id="image-actions" style="display:none;">
                            <button type="button" class="remove-image-btn" onclick="removeImage()">
                                <i class="fas fa-trash"></i> Remove Image
                            </button>
                        </div>
                    </div>

                    <!-- Form Actions -->
                    <div class="btn-row">
                        <a href="admin.html" class="btn-cancel">
                            <i class="fas fa-times"></i> Cancel
                        </a>
                        <button type="submit" class="btn-submit" id="submit-btn">
                            <span class="btn-text"><i class="fas fa-plus"></i> Create Event</span>
                            <span class="btn-loading" style="display:none;"><i class="fas fa-spinner fa-spin"></i>
                                Creating…</span>
                        </button>
                    </div>

                </form>
            </div>
        </main>
    </div>

    <script src="../js/config.js"></script>
    <script src="../js/add-event.js"></script>
    <script>
        // Beginner-friendly way to prevent picking past dates in the calendar
        document.addEventListener('DOMContentLoaded', () => {
            const dateInput = document.getElementById('event_date');
            if (dateInput) {
                // Get today's date in YYYY-MM-DD format
                const today = new Date().toISOString().split('T')[0];
                // Set the 'min' attribute so the browser blocks past dates
                dateInput.setAttribute('min', today);
            }
        });
    </script>
</body>

</html>
